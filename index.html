<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Ôn tập Trắc nghiệm</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #222222;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .active {
            display: flex;
        }
        
        /* Menu Screen */
        .menu-header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }
        .menu-module {
            color: #1565c0;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .menu-title {
            font-size: 20px;
            font-weight: bold;
        }
        .btn-menu {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 15px;
            margin: 10px auto;
            width: 100%;
            max-width: 300px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Quiz Screen */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .progress-text {
            font-size: 14px;
            color: #333333;
        }
        .btn-exit {
            background-color: #ef9a9a;
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .options-container {
            flex-grow: 1;
            overflow-y: auto;
        }
        .btn-option {
            display: block;
            width: 100%;
            text-align: left;
            background-color: #ffffff;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            white-space: normal;
            word-wrap: break-word;
            line-height: 1.3;
        }
        .btn-option:disabled {
            cursor: default;
            color: #222;
        }
        .correct { background-color: #a5d6a7 !important; border-color: #a5d6a7; }
        .wrong { background-color: #ef9a9a !important; border-color: #ef9a9a; }

        /* Navigation Bar (Fixed Bottom) */
        .nav-bar {
            display: flex;
            justify-content: flex-start;
            gap: 15px;
            margin-top: 20px;
            padding-top: 10px;
        }
        .btn-nav {
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }
        .btn-prev { background-color: #9e9e9e; }
        .btn-next { background-color: #4a90e2; }

        /* Result Screen */
        .result-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .result-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="screen-menu" class="screen active">
        <div class="menu-header">
            <div class="menu-module">Học phần Lịch Sử Đảng Cộng Sản</div>
            <div class="menu-title">CHỌN CHƯƠNG ÔN TẬP</div>
        </div>
        <button class="btn-menu" onclick="startQuiz('chuongnhapmon.json')">Chương Nhập Môn</button>
        <button class="btn-menu" onclick="startQuiz('chuong1.json')">Chương 1</button>
        <button class="btn-menu" onclick="startQuiz('chuong2.json')">Chương 2</button>
    </div>

    <div id="screen-quiz" class="screen">
        <div class="top-bar">
            <div id="progress-lbl" class="progress-text">Tiến độ: 0 | Điểm: 0</div>
            <button class="btn-exit" onclick="showScreen('screen-menu')">Thoát về Menu</button>
        </div>
        <div id="question-lbl" class="question-text"></div>
        <div id="options-container" class="options-container">
            </div>
        <div class="nav-bar">
            <button id="btn-prev" class="btn-nav btn-prev" onclick="prevQuestion()" style="display: none;">Quay lại</button>
            <button id="btn-next" class="btn-nav btn-next" onclick="nextQuestion()" style="display: none;">Câu tiếp theo</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <div class="result-container">
            <div class="result-text">Tuyệt vời!<br>Bạn đã hoàn thành chính xác 100% bộ câu hỏi.</div>
            <button class="btn-menu" onclick="showScreen('screen-menu')">Quay về Menu Chính</button>
        </div>
    </div>

    <script>
        let allQuestions = [];
        let activeQuestions = [];
        let userAnswers = [];
        let currentQIndex = 0;

        // Hàm chuyển đổi màn hình
        function showScreen(screenId) {
            document.getElementById('screen-menu').classList.remove('active');
            document.getElementById('screen-quiz').classList.remove('active');
            document.getElementById('screen-result').classList.remove('active');
            document.getElementById(screenId).classList.add('active');
        }

        // Hàm tải dữ liệu và bắt đầu ôn tập
        async function startQuiz(fileName) {
            try {
                const response = await fetch(fileName);
                if (!response.ok) throw new Error("Không tìm thấy file");
                allQuestions = await response.json();
                
                // Xáo trộn mảng câu hỏi
                allQuestions.sort(() => Math.random() - 0.5);
                activeQuestions = [...allQuestions];
                userAnswers = new Array(activeQuestions.length).fill(null);
                currentQIndex = 0;
                
                showScreen('screen-quiz');
                loadQuestion();
            } catch (error) {
                alert("Lỗi tải dữ liệu: " + fileName + "\n\nLưu ý: Nếu bạn mở trực tiếp trên máy tính, trình duyệt có thể chặn đọc file nội bộ. Hãy đưa lên mạng theo hướng dẫn.");
            }
        }

        // Hàm hiển thị câu hỏi hiện tại
        function loadQuestion() {
            if (currentQIndex >= activeQuestions.length) {
                evaluateRound();
                return;
            }

            const q = activeQuestions[currentQIndex];
            document.getElementById('question-lbl').innerText = `Câu ${currentQIndex + 1}: ${q.question}`;

            let answeredCount = userAnswers.filter(ans => ans !== null).length;
            let currentScore = userAnswers.filter((ans, i) => ans === activeQuestions[i].correctAnswer).length;
            document.getElementById('progress-lbl').innerText = `Đã trả lời: ${answeredCount}/${activeQuestions.length} câu | Điểm: ${currentScore}`;

            document.getElementById('btn-prev').style.display = currentQIndex > 0 ? "block" : "none";

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ""; // Xóa các đáp án cũ

            const answeredKey = userAnswers[currentQIndex];
            const correctKey = q.correctAnswer;
            const keys = ['A', 'B', 'C', 'D'];

            keys.forEach(key => {
                if (q.options[key]) {
                    const btn = document.createElement('button');
                    btn.className = 'btn-option';
                    btn.innerText = `${key}. ${q.options[key]}`;
                    
                    if (answeredKey === null) {
                        btn.onclick = () => checkAnswer(key);
                    } else {
                        btn.disabled = true;
                        if (key === correctKey) {
                            btn.classList.add('correct');
                        } else if (key === answeredKey) {
                            btn.classList.add('wrong');
                        }
                    }
                    optionsContainer.appendChild(btn);
                }
            });

            document.getElementById('btn-next').style.display = answeredKey !== null ? "block" : "none";
        }

        // Hàm lưu đáp án
        function checkAnswer(selectedKey) {
            userAnswers[currentQIndex] = selectedKey;
            loadQuestion();
        }

        // Nút điều hướng
        function prevQuestion() {
            if (currentQIndex > 0) {
                currentQIndex--;
                loadQuestion();
            }
        }

        function nextQuestion() {
            currentQIndex++;
            loadQuestion();
        }

        // Đánh giá sau mỗi vòng lặp
        function evaluateRound() {
            let wrongQs = [];
            for (let i = 0; i < activeQuestions.length; i++) {
                if (userAnswers[i] !== activeQuestions[i].correctAnswer) {
                    wrongQs.push(activeQuestions[i]);
                }
            }

            if (wrongQs.length === 0) {
                showScreen('screen-result');
            } else {
                let correctCount = activeQuestions.length - wrongQs.length;
                alert(`Kết quả vòng này: Bạn làm đúng ${correctCount}/${activeQuestions.length} câu.\n\nHệ thống sẽ tạo vòng ôn tập mới với ${wrongQs.length} câu sai để bạn làm lại.`);
                
                activeQuestions = wrongQs;
                activeQuestions.sort(() => Math.random() - 0.5);
                userAnswers = new Array(activeQuestions.length).fill(null);
                currentQIndex = 0;
                loadQuestion();
            }
        }
    </script>
</body>
</html>
